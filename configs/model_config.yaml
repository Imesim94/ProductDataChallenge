# ============================================================================
# Model Configuration - ProductDataChallenge
# ============================================================================

classifier:
  # Text vectorization
  vectorizer:
    type: "tfidf"
    max_features: 2000
    ngram_range: [1, 1]
    min_df: 2
    max_df: 0.95
    sublinear_tf: true

  # Primary model: LightGBM (fast, interpretable, production-grade)
  lgbm:
    n_estimators: 200
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 31
    min_child_samples: 5
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1
    verbose: -1

  # Baseline model: Logistic Regression
  logistic:
    C: 1.0
    max_iter: 1000
    class_weight: "balanced"
    random_state: 42
    n_jobs: -1

  # Cross-validation
  cv:
    n_splits: 5
    shuffle: true
    random_state: 42

  # SHAP explainability
  shap:
    max_display: 20
    plot_type: "bar"

basket_analysis:
  # FP-Growth parameters
  min_support: 0.01
  min_confidence: 0.1
  min_lift: 1.0
  max_itemset_length: 3

mlflow:
  experiment_name: "product-taxonomy-classifier"
  tracking_uri: "sqlite:///mlflow.db"
  registry_uri: "sqlite:///mlflow.db"

api:
  host: "0.0.0.0"
  port: 8000
  model_path: "models/classifier_pipeline.joblib"
  batch_size: 32
